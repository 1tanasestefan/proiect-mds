spring:
  application:
    name: vacation-planner

  # ── Database (H2 for development) ──
  datasource:
    url: jdbc:h2:mem:vacationdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # ── Uncomment below for PostgreSQL production ──
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/vacationdb
  #   driver-class-name: org.postgresql.Driver
  #   username: postgres
  #   password: your_password
  # jpa:
  #   database-platform: org.hibernate.dialect.PostgreSQLDialect

# ── JWT Configuration ──
app:
  jwt:
    secret: c2VjdXJlLWtleS13aGljaC1pcy1hdC1sZWFzdC0zMi1ieXRlcy1sb25n
    expiration-ms: 86400000  # 24 hours

# ── Server ──
server:
  port: 8080
